<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Super Goode Map</title>
  <link rel="icon" href="https://static.wixstatic.com/media/5ca2b9_94514466d76d421d9c21b29de7b2e2c9~mv2.png/v1/fill/w_41,h_40,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/5ca2b9_94514466d76d421d9c21b29de7b2e2c9~mv2.png" />
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --bg:#f5f4fa;
      --panel:#0b1529;
      --panel2:#111d35;
      --line:rgba(145,165,255,.14);
      --text:#f3f6ff;
      --muted:#aab4cc;
      --accent:#b866ff;
      --accent2:#7d8cff;
      --brand:#8b5cf6;
      --brand2:#c084fc;
      --gold:#f2c94c;
      --ink:#22232a;
      --paper:#fbfbfd;
      --shadow:0 14px 40px rgba(0,0,0,.28);
      --radius:18px;
      --headerH: 0px;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; background:radial-gradient(circle at top left, #ffffff 0, #f6f3fb 28%, #ebedf5 100%); color:var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    body { min-height:100dvh; }
    a { color:#7ea7ff; text-decoration:none; }
    .app {
      min-height:100dvh;
      display:flex;
      flex-direction:column;
    }
    .map-wrap {
      order:1;
      position:relative;
      height:38dvh;
      min-height:280px;
      max-height:380px;
      border-bottom:1px solid var(--line);
      background:#a7d3d9;
      overflow:hidden;
    }
    #map { width:100%; height:100%; }
    .map-toggle {
      display:none;
      position:absolute;
      left:12px;
      top:12px;
      z-index:600;
      border:none;
      border-radius:999px;
      padding:11px 14px;
      background:rgba(11,21,41,.9);
      color:#fff;
      backdrop-filter:blur(12px);
      box-shadow:0 12px 26px rgba(0,0,0,.18);
      font-size:14px;
      font-weight:900;
      letter-spacing:.01em;
    }
    .panel {
      order:2;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.00)),
        linear-gradient(180deg, rgba(110,76,255,.05), rgba(0,0,0,0));
      padding:14px;
      overflow:visible;
    }
    .brand-card {
      display:flex;
      align-items:center;
      gap:14px;
      border-radius:24px;
      padding:16px 16px 15px;
      background:linear-gradient(180deg, rgba(255,255,255,.97), rgba(248,247,252,.92));
      color:var(--ink);
      border:1px solid rgba(40,44,67,.08);
      box-shadow:0 16px 32px rgba(17,24,39,.08);
      margin-bottom:12px;
    }
    .brand-avatar {
      width:52px;
      height:52px;
      border-radius:50%;
      flex:0 0 auto;
      box-shadow:0 10px 22px rgba(139,92,246,.18);
    }
    .brand-copy { min-width:0; }
    .brand-kicker {
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--brand);
      font-weight:800;
      margin:0 0 4px;
    }
    .brand-title {
      font-size:clamp(26px, 4vw, 31px);
      line-height:1;
      margin:0;
      letter-spacing:-.05em;
      color:var(--ink);
      font-weight:900;
    }
    h1 {
      font-size:clamp(34px, 6vw, 26px);
      line-height:1.02;
      margin:0;
      letter-spacing:-.03em;
    }
    .subtitle {
      color:var(--muted);
      line-height:1.35;
      margin:8px 0 12px;
      font-size:13px;
      max-width:42rem;
    }
    .controls {
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-bottom:12px;
    }
    .search, select {
      width:100%;
      height:44px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(17,29,53,.92);
      color:var(--text);
      padding:0 14px;
      font-size:15px;
      outline:none;
    }
    .row2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .chips {
      display:flex;
      gap:8px;
      overflow:auto hidden;
      padding-bottom:2px;
      scrollbar-width:none;
    }
    .chips::-webkit-scrollbar { display:none; }
    .chip {
      border:1px solid var(--line);
      background:#101a31;
      color:#e7ebf7;
      border-radius:999px;
      padding:9px 13px;
      font-weight:700;
      font-size:13px;
      white-space:nowrap;
      cursor:pointer;
      user-select:none;
    }
    .chip.active {
      background:linear-gradient(135deg,var(--accent2),var(--accent));
      border-color:transparent;
      color:white;
    }
    .statusbar {
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin:10px 0 12px;
      color:var(--muted);
      font-size:12px;
    }
    .pill {
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      background:#10192f;
      border-radius:999px;
      padding:7px 10px;
    }
    .dot {
      width:8px; height:8px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 0 0 4px rgba(184,102,255,.12);
      flex:0 0 auto;
    }
    .stats {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:12px;
    }
    .stat {
      border:1px solid var(--line);
      background:linear-gradient(180deg,#10192f,#0d1629);
      border-radius:16px;
      padding:10px 12px;
      min-width:0;
      position:relative;
      overflow:hidden;
    }
    .stat .label { color:var(--muted); font-size:11px; margin-bottom:3px; }
    .stat .value { font-weight:800; font-size:27px; line-height:1; }
    .stat::after {
      content:'';
      position:absolute;
      inset:auto -20px -20px auto;
      width:64px;
      height:64px;
      background:radial-gradient(circle, rgba(184,102,255,.2), rgba(184,102,255,0) 68%);
      pointer-events:none;
    }
    .list {
      display:grid;
      gap:10px;
    }
    .card {
      border:1px solid var(--line);
      background:linear-gradient(180deg,#0e1730,#0a1326);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .card::before {
      content:'';
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:3px;
      background:linear-gradient(90deg,var(--brand),var(--accent2));
      opacity:.85;
    }
    .card-top {
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom:6px;
    }
    .name {
      font-weight:800;
      font-size:16px;
      line-height:1.18;
      letter-spacing:-.02em;
    }
    .restaurant-subtitle {
      margin-top:4px;
      color:#c7b3ff;
      font-size:12px;
      line-height:1.3;
      font-weight:700;
      letter-spacing:-.01em;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .meta {
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
      min-height:16px;
    }
    .score {
      flex:0 0 auto;
      min-width:54px;
      text-align:center;
      padding:8px 10px;
      border-radius:999px;
      font-weight:900;
      line-height:1;
      color:#0a0f1a;
      background:#bcc6dd;
    }
    .score.gold { background:var(--gold); }
    .score.purple { background:#b678ff; color:white; }
    .score.gray { background:#a8b1c3; }
    .card-actions {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    button, .btn {
      appearance:none;
      border:1px solid var(--line);
      background:#121d35;
      color:var(--text);
      border-radius:999px;
      padding:9px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
    }
    .btn.primary, button.primary {
      border:none;
      background:linear-gradient(135deg,var(--accent2),var(--accent));
      color:white;
    }
    .btn.primary:hover, button.primary:hover {
      filter:brightness(1.05);
    }
    .btn.subtle, button.subtle {
      color:#d6dff6;
      background:#0f1830;
    }
    .btn[disabled], button[disabled] {
      opacity:.45;
      cursor:default;
      pointer-events:none;
    }
    .map-legend {
      position:absolute;
      top:12px;
      right:12px;
      z-index:500;
      border:1px solid rgba(0,0,0,.08);
      background:rgba(7,14,28,.88);
      color:white;
      backdrop-filter: blur(8px);
      border-radius:16px;
      padding:10px 12px;
      font-size:12px;
      box-shadow:var(--shadow);
    }
    .legend-title { font-weight:800; margin-bottom:6px; }
    .legend-row { display:flex; align-items:center; gap:8px; margin-top:4px; color:#d6ddf0; }
    .swatch { width:10px; height:10px; border-radius:50%; }
    .footer-note {
      color:var(--muted);
      font-size:12px;
      margin-top:12px;
      line-height:1.4;
    }
    .empty {
      border:1px dashed var(--line);
      color:var(--muted);
      border-radius:16px;
      padding:18px;
      text-align:center;
    }
    .map-focus .map-wrap {
      height:100dvh;
      min-height:0;
      max-height:none;
    }
    .map-focus .map-toggle {
      background:linear-gradient(135deg, rgba(139,92,246,.98), rgba(192,132,252,.98));
    }
    .leaflet-popup-content-wrapper { border-radius:18px; }
    .popup-title { font-size:18px; font-weight:800; line-height:1.2; margin:0 0 6px; }
    .popup-subtitle {
      color:#8e66ff;
      font-size:13px;
      line-height:1.35;
      font-weight:700;
      margin-bottom:6px;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .popup-sub { font-size:13px; color:#586077; margin-bottom:8px; }
    .popup-links a, .popup-links span {
      display:block;
      font-size:15px;
      margin-top:2px;
    }
    .popup-links span { color:#99a0b4; }
    @media (max-width: 899px) {
      html, body { overflow:auto; height:auto; }
      .app {
        min-height:100dvh;
        height:auto;
        overflow:visible;
      }
      .map-wrap {
        height:24dvh;
        min-height:190px;
        max-height:26dvh;
        border-bottom:1px solid var(--line);
      }
      .map-toggle {
        display:inline-flex;
        align-items:center;
        left:12px;
        top:auto;
        bottom:12px;
        transform:none;
      }
      .panel {
        overflow:visible;
        padding:10px 12px calc(20px + env(safe-area-inset-bottom));
        margin-top:0;
        border-radius:24px 24px 0 0;
        background:linear-gradient(180deg, rgba(247,246,251,.98), rgba(244,242,248,.96));
        box-shadow:none;
      }
      .map-focus .panel {
        margin-top:0;
      }
      .sticky-head {
        position:relative;
        top:auto;
        z-index:auto;
        padding-bottom:10px;
        background:none;
        backdrop-filter:none;
      }
      .brand-card { padding:14px; border-radius:22px; }
      .brand-avatar { width:46px; height:46px; }
      .brand-title { font-size:28px; }
      .controls { gap:8px; margin-bottom:10px; }
      .stats { margin-bottom:8px; }
      .brand-card { margin-bottom:10px; }
      .chip { padding:8px 11px; }
      .search, select { height:42px; }
      .stats { grid-template-columns:1fr 1fr; }
      .stat .value { font-size:23px; }
      .card-actions .btn,
      .card-actions button {
        flex:1 1 calc(33.333% - 8px);
        font-size:11px;
        padding:8px 10px;
      }
      .card-actions {
        gap:6px;
      }
    }
    @media (min-width: 900px) {
      html, body { overflow:hidden; }
      .app {
        height:100dvh;
        display:grid;
        grid-template-columns:390px 1fr;
        grid-template-rows:100dvh;
      }
      .panel {
        order:1;
        overflow:auto;
        padding:18px 14px 18px 14px;
        border-right:1px solid var(--line);
      }
      .map-wrap {
        order:2;
        height:100dvh;
        min-height:0;
        max-height:none;
      }
      .sticky-head {
        position:sticky;
        top:0;
        z-index:20;
        padding-bottom:10px;
        background:linear-gradient(180deg, rgba(7,16,31,1) 78%, rgba(7,16,31,0));
      }
      .stats { grid-template-columns:1fr 1fr; }
      .stat .value { font-size:18px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="map-wrap">
      <div id="map" aria-label="Map of restaurants"></div>
      <button id="mobileMapToggle" class="map-toggle" type="button">Show full map</button>
      <div class="map-legend">
        <div class="legend-title">Score tiers</div>
        <div class="legend-row"><span class="swatch" style="background:#f2c94c"></span>9.0 and up</div>
        <div class="legend-row"><span class="swatch" style="background:#b678ff"></span>8.0 to 8.9</div>
        <div class="legend-row"><span class="swatch" style="background:#a8b1c3"></span>7.0 to 7.9</div>
      </div>
    </section>

    <aside class="panel">
      <div class="sticky-head">
        <div class="brand-card">
          <img
            class="brand-avatar"
            src="https://static.wixstatic.com/media/5ca2b9_94514466d76d421d9c21b29de7b2e2c9~mv2.png/v1/fill/w_41,h_40,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/5ca2b9_94514466d76d421d9c21b29de7b2e2c9~mv2.png"
            alt="Philip Goode icon"
          />
          <div class="brand-copy">
            <div class="brand-kicker">Philip Goode</div>
            <div class="brand-title">Super Goode Map</div>
          </div>
        </div>

        <div class="controls">
          <input id="searchInput" class="search" type="search" placeholder="Search restaurants..." />
          <div class="row2">
            <select id="scoreFilter">
              <option value="all">All scores</option>
              <option value="9">9.0 and up</option>
              <option value="8">8.0 and up</option>
              <option value="7">7.0 and up</option>
            </select>
            <select id="sortFilter">
              <option value="scoreDesc">Highest score</option>
              <option value="scoreAsc">Lowest score</option>
              <option value="nameAsc">A to Z</option>
              <option value="near">Nearest to me</option>
              <option value="mappedFirst">Mapped first</option>
            </select>
          </div>
          <div class="chips" id="quickChips">
            <button class="chip active" data-chip="all">All</button>
            <button class="chip" data-chip="9plus">9+</button>
            <button class="chip" data-chip="8plus">8s</button>
            <button class="chip" data-chip="7s">7s</button>
            <button class="chip" data-chip="mapped">Mapped</button>
          </div>
          <div class="row2">
            <button id="locateMeBtn" class="btn primary">Use my location</button>
            <button id="showNearbyBtn" class="btn">Near me</button>
          </div>
        </div>

        <div class="statusbar">
          <span class="pill"><span class="dot"></span><span id="autoStatus">Ready</span></span>
          <button id="fitMappedBtn" class="subtle">Fit mapped pins</button>
        </div>

        <div class="stats">
          <div class="stat"><div class="label">Showing</div><div class="value" id="statShowing">0</div></div>
          <div class="stat"><div class="label">Mapped</div><div class="value" id="statMapped">0</div></div>
          <div class="stat"><div class="label">Average</div><div class="value" id="statAvg">0.0</div></div>
          <div class="stat"><div class="label">Top score</div><div class="value" id="statTop">0.0</div></div>
        </div>
      </div>

      <div id="list" class="list"></div>
    </aside>
  </div>

    function scoreClass(score) {
      if (score >= 9) return 'gold';
      if (score >= 8) return 'purple';
      return 'gray';
    }

    function cloneItem(item) {
      return { ...item };
    }

    function buildStateItem(data, idx) {
      const lat = Number(data.lat);
      const lng = Number(data.lng);
      return {
        id: idx + 1,
        ...data,
        lat: Number.isFinite(lat) ? lat : null,
        lng: Number.isFinite(lng) ? lng : null,
        address: data.address || '',
        mapped: Number.isFinite(lat) && Number.isFinite(lng),
        locating: false,
        failed: false,
      };
    }

    function markerColor(score) {
      if (score >= 9) return '#f2c94c';
      if (score >= 8) return '#b678ff';
      return '#8f9bb3';
    }

    function makeIcon(score) {
      const color = markerColor(score);
      return L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:3px solid rgba(8,12,20,.85);box-shadow:0 4px 14px rgba(0,0,0,.35)"></div>`,
        iconSize: [16,16],
        iconAnchor: [8,8],
        popupAnchor: [0,-6],
      });
    }

    function normalizeName(name) {
      return name
        .replace(/\s+/g, ' ')
        .replace(/[’']/g, "'")
        .trim();
    }

    function directionsUrl(item) {
      if (item.directionsUrl) return item.directionsUrl;
      if (item.loc && item.loc.directionsUrl) return item.loc.directionsUrl;
      if (item.address) {
        return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(item.address)}`;
      }
      return `https://www.google.com/maps/search/${encodeURIComponent(normalizeName(item.name) + ', Chicago, IL')}`;
    }

    function popupHtml(item) {
      const reviewHtml = item.reviewUrl
        ? `<a href="${item.reviewUrl}" target="_blank" rel="noopener noreferrer">Review Video</a>`
        : `<span>Review Video</span>`;
      const dirHtml = `<a href="${directionsUrl(item)}" target="_blank" rel="noopener noreferrer">Directions</a>`;
      const address = item.address ? escapeHtml(item.address) : 'Location not locked yet';
      const subtitleHtml = item.subtitle ? `<div class="popup-subtitle">${escapeHtml(item.subtitle)}</div>` : '';
      return `
        <div class="popup-title">${escapeHtml(item.name)} (${item.score.toFixed(1)})</div>
        ${subtitleHtml}
        <div class="popup-sub">${address}</div>
        <div class="popup-links">${reviewHtml}${dirHtml}</div>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'", '&#39;');
    }

    function haversineMiles(lat1, lon1, lat2, lon2) {
      const toRad = (value) => value * Math.PI / 180;
      const earthRadius = 3958.8;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * earthRadius * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function distanceMiles(item) {
      if (!state.userLocation || !item.mapped) return null;
      if (!Number.isFinite(item.lat) || !Number.isFinite(item.lng)) return null;
      return haversineMiles(state.userLocation.lat, state.userLocation.lng, item.lat, item.lng);
    }

    function requestUserLocation() {
      if (!navigator.geolocation) {
        els.autoStatus.textContent = 'This browser does not support current location.';
        return;
      }

      els.autoStatus.textContent = 'Requesting your location...';
      navigator.geolocation.getCurrentPosition(
        (position) => {
          state.userLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude,
          };
          saveUserLocation(state.userLocation);
          els.sortFilter.value = 'near';
          state.nearbyOnly = true;
          els.showNearbyBtn.classList.add('primary');
          render();
          fitUserLocation();
        },
        () => {
          state.nearbyOnly = false;
          els.showNearbyBtn.classList.remove('primary');
          els.autoStatus.textContent = 'Location permission was not granted.';
          render();
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 },
      );
    }

    function fitUserLocation() {
      if (!state.userLocation || !state.map) return;
      state.map.setView([state.userLocation.lat, state.userLocation.lng], 11);
      if (state.userMarker) {
        state.map.removeLayer(state.userMarker);
      }
      state.userMarker = L.circleMarker([state.userLocation.lat, state.userLocation.lng], {
        radius: 8,
        weight: 3,
        color: '#fff',
        fillColor: '#3cb8ff',
        fillOpacity: 1,
      }).bindPopup('Your location').addTo(state.map);
    }

    function loadSavedLocations() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        for (const item of state.items) {
          const s = saved[item.name];
          if (s && Number.isFinite(s.lat) && Number.isFinite(s.lng)) {
            item.lat = s.lat;
            item.lng = s.lng;
            item.address = s.address || '';
            item.mapped = true;
          }
        }
      } catch (err) {
        console.warn('Could not load saved locations', err);
      }
    }

    function loadUserLocation() {
      try {
        const raw = localStorage.getItem(USER_LOCATION_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (err) {
        console.warn('Could not load user location', err);
        return null;
      }
    }

    function saveUserLocation(loc) {
      localStorage.setItem(USER_LOCATION_KEY, JSON.stringify(loc));
    }

    function persistItem(item) {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      saved[item.name] = { lat:item.lat, lng:item.lng, address:item.address || '' };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    }

    function setMobileMapFocus(enabled) {
      state.mobileMapFocus = enabled;
      document.body.classList.toggle('map-focus', enabled);
      if (els.mobileMapToggle) {
        els.mobileMapToggle.textContent = enabled ? 'Show list' : 'Show full map';
      }
      setTimeout(() => state.map?.invalidateSize(), 120);
      if (enabled) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    async function geocodeItem(item) {
      if (item.locating) return false;
      item.locating = true;
      item.failed = false;
      renderStatus();

      const shared = state.sharedIndex.get(normalizeName(item.name).toLowerCase());
      if (shared && Number.isFinite(shared.lat) && Number.isFinite(shared.lng)) {
        item.lat = shared.lat;
        item.lng = shared.lng;
        item.address = shared.address || '';
        item.reviewUrl = shared.reviewUrl || item.reviewUrl || '';
        item.directionsUrl = shared.directionsUrl || item.directionsUrl || '';
        item.mapped = true;
        item.locating = false;
        persistItem(item);
        upsertMarker(item);
        render();
        return true;
      }

      item.locating = false;
      item.failed = true;
      render();
      return false;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function buildQueue() {
      const filtered = getFilteredItems();
      const remaining = filtered.filter(item => !item.mapped);
      const rest = state.items.filter(item => !item.mapped && !remaining.includes(item));
      return [...remaining, ...rest];
    }

    function startAutoLocation(force = false) {
      if (state.autoStarted && !force) return;
      state.autoStarted = true;
      state.locatingQueue = buildQueue();
      state.queueIndex = 0;
      runLocateQueue();
    }

    async function runLocateQueue() {
      if (state.locateTimer) return;
      state.locateTimer = true;
      while (state.queueIndex < state.locatingQueue.length) {
        const item = state.locatingQueue[state.queueIndex++];
        if (!item || item.mapped) continue;
        await geocodeItem(item);
        renderStatus();
        await sleep(1200);
      }
      state.locateTimer = null;
      renderStatus();
    }

    function refreshQueue() {
      if (!state.autoStarted) return;
      state.locatingQueue = buildQueue();
      state.queueIndex = 0;
      state.locateTimer = null;
      runLocateQueue();
    }

    function upsertMarker(item) {
      if (!item.mapped) return;
      const existing = state.markers.get(item.id);
      if (existing) {
        existing.setLatLng([item.lat, item.lng]);
        existing.setPopupContent(popupHtml(item));
        return;
      }
      const marker = L.marker([item.lat, item.lng], { icon: makeIcon(item.score) })
        .addTo(state.map)
        .bindPopup(popupHtml(item));
      state.markers.set(item.id, marker);
    }

    function syncMarkersToFilter() {
      const visibleIds = new Set(getFilteredItems().filter(x => x.mapped).map(x => x.id));
      for (const item of state.items) {
        const marker = state.markers.get(item.id);
        if (!marker) continue;
        if (visibleIds.has(item.id)) {
          if (!state.map.hasLayer(marker)) marker.addTo(state.map);
        } else {
          if (state.map.hasLayer(marker)) state.map.removeLayer(marker);
        }
      }
    }

    function getFilteredItems() {
      const q = els.searchInput.value.trim().toLowerCase();
      const scoreFilter = els.scoreFilter.value;
      const sort = els.sortFilter.value;

      let arr = state.items.filter(item => {
        if (q && !item.name.toLowerCase().includes(q)) return false;
        if (scoreFilter !== 'all' && item.score < Number(scoreFilter)) return false;
        if (state.quickChip === '9plus' && item.score < 9) return false;
        if (state.quickChip === '8plus' && (item.score < 8 || item.score >= 9)) return false;
        if (state.quickChip === '7s' && item.score >= 8) return false;
        if (state.quickChip === 'mapped' && !item.mapped) return false;
        if (state.nearbyOnly) {
          const dist = distanceMiles(item);
          if (!Number.isFinite(dist) || dist > 10) return false;
        }
        return true;
      });

      arr.sort((a,b) => {
        if (sort === 'scoreAsc') return a.score - b.score || a.name.localeCompare(b.name);
        if (sort === 'nameAsc') return a.name.localeCompare(b.name);
        if (sort === 'near' && state.userLocation) {
          return (distanceMiles(a) ?? 1e9) - (distanceMiles(b) ?? 1e9) || b.score - a.score || a.name.localeCompare(b.name);
        }
        if (sort === 'mappedFirst') return Number(b.mapped) - Number(a.mapped) || b.score - a.score;
        return b.score - a.score || a.name.localeCompare(b.name);
      });
      return arr;
    }

    function renderStats(filtered) {
      const mappedCount = state.items.filter(i => i.mapped).length;
      const avg = filtered.length ? filtered.reduce((s,i) => s + i.score, 0) / filtered.length : 0;
      const top = filtered.length ? Math.max(...filtered.map(i => i.score)) : 0;
      els.statShowing.textContent = filtered.length;
      els.statMapped.textContent = mappedCount;
      els.statAvg.textContent = avg.toFixed(1);
      els.statTop.textContent = top.toFixed(1);
    }

    function renderStatus() {
      const mapped = state.items.filter(i => i.mapped).length;
      const remaining = state.items.length - mapped;
      const active = state.items.find(i => i.locating);
      if (active) {
        els.autoStatus.textContent = `Matching: ${active.name} · ${mapped} mapped`;
      } else if (state.userLocation && state.nearbyOnly) {
        els.autoStatus.textContent = `Showing places near you · ${mapped} mapped`;
      } else if (state.userLocation) {
        els.autoStatus.textContent = `Location on · ${mapped} mapped`;
      } else if (remaining > 0) {
        els.autoStatus.textContent = `Shared data loaded · ${mapped} mapped`;
      } else {
        els.autoStatus.textContent = `All places processed · ${mapped} mapped`;
      }
    }

    function render() {
      const filtered = getFilteredItems();
      renderStats(filtered);
      renderStatus();
      syncMarkersToFilter();

      if (!filtered.length) {
        els.list.innerHTML = `<div class="empty">No restaurants match this view.</div>`;
        return;
      }

      els.list.innerHTML = filtered.map(item => `
        <article class="card">
          <div class="card-top">
            <div>
              <div class="name">${escapeHtml(item.name)}</div>
              ${item.subtitle ? `<div class="restaurant-subtitle">${escapeHtml(item.subtitle)}</div>` : ''}
              <div class="meta">${
                item.mapped ? escapeHtml(shortAddress(item.address)) :
                item.locating ? 'Locating now…' :
                item.failed ? 'Could not match yet' :
                'Waiting for shared location data'
              }${state.userLocation && item.mapped && Number.isFinite(distanceMiles(item)) ? `<div class="dist">📍 ${distanceMiles(item).toFixed(1)} mi away</div>` : ''}</div>
            </div>
            <div class="score ${scoreClass(item.score)}">${item.score.toFixed(1)}</div>
          </div>
          <div class="card-actions">
            <button class="primary" data-action="show" data-id="${item.id}" ${item.mapped ? '' : 'disabled'}>Show on map</button>
            <a class="btn subtle" href="${directionsUrl(item)}" target="_blank" rel="noopener noreferrer">Directions</a>
            <button class="subtle" data-action="video" data-id="${item.id}" ${item.reviewUrl ? '' : 'disabled'}>Review video</button>
          </div>
        </article>
      `).join('');
    }

    function shortAddress(address) {
      if (!address) return '';
      const parts = address.split(',');
      return parts.slice(0, 3).join(',').trim();
    }

    function setActiveChip(chip) {
      state.quickChip = chip;
      [...els.quickChips.querySelectorAll('.chip')].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.chip === chip);
      });
      render();
      refreshQueue();
    }

    function fitMappedPins() {
      const markers = [...state.markers.values()].filter(m => state.map.hasLayer(m));
      if (!markers.length) return;
      const group = L.featureGroup(markers);
      state.map.fitBounds(group.getBounds().pad(0.18), { animate:true });
    }

    function bindEvents() {
      els.searchInput.addEventListener('input', () => { render(); refreshQueue(); });
      els.scoreFilter.addEventListener('change', () => { render(); refreshQueue(); });
      els.sortFilter.addEventListener('change', render);
      els.locateMeBtn.addEventListener('click', requestUserLocation);
      els.showNearbyBtn.addEventListener('click', () => {
        state.nearbyOnly = !state.nearbyOnly;
        els.showNearbyBtn.classList.toggle('primary', state.nearbyOnly);
        if (state.nearbyOnly && !state.userLocation) {
          requestUserLocation();
          return;
        }
        render();
      });
      els.fitMappedBtn.addEventListener('click', fitMappedPins);
      els.mobileMapToggle.addEventListener('click', () => setMobileMapFocus(!state.mobileMapFocus));
      els.quickChips.addEventListener('click', (e) => {
        const btn = e.target.closest('.chip');
        if (!btn) return;
        setActiveChip(btn.dataset.chip);
      });

      els.list.addEventListener('click', async (e) => {
        const target = e.target.closest('[data-action]');
        if (!target) return;
        const id = Number(target.dataset.id);
        const item = state.items.find(x => x.id === id);
        if (!item) return;

        const action = target.dataset.action;
        if (action === 'show' && item.mapped) {
          state.map.flyTo([item.lat, item.lng], 15, { duration:0.7 });
          const marker = state.markers.get(item.id);
          if (marker) marker.openPopup();
        }
        if (action === 'retry') {
          await geocodeItem(item);
          render();
        }
        if (action === 'video' && item.reviewUrl) {
          window.open(item.reviewUrl, '_blank', 'noopener,noreferrer');
        }
      });

      window.addEventListener('resize', () => {
        setTimeout(() => state.map.invalidateSize(), 100);
      });
    }

    function initMap() {
      state.map = L.map('map', {
        zoomControl:true,
        preferCanvas:true
      }).setView([41.8781, -87.6298], 9);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20
      }).addTo(state.map);

      state.items.filter(i => i.mapped).forEach(upsertMarker);
      if (state.userLocation) {
        fitUserLocation();
      }
      setTimeout(() => state.map.invalidateSize(), 120);
    }

    async function loadSharedData() {
      let lastError = null;
      for (const url of SHARED_DATA_URLS) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) {
            throw new Error(`Failed to load ${url}: ${response.status}`);
          }
          const data = await response.json();
          state.baseItems = Array.isArray(data) ? data.map(buildStateItem) : [];
          state.items = state.baseItems.map(cloneItem);
          state.sharedIndex = new Map(state.baseItems.map((item) => [normalizeName(item.name).toLowerCase(), item]));
          return;
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('Failed to load shared data');
    }

    async function bootstrap() {
      try {
        await loadSharedData();
      } catch (err) {
        console.warn('Falling back to embedded data', err);
        state.baseItems = DATA.map(buildStateItem);
        state.items = state.baseItems.map(cloneItem);
        state.sharedIndex = new Map(state.baseItems.map((item) => [normalizeName(item.name).toLowerCase(), item]));
      }

      loadSavedLocations();
      initMap();
      bindEvents();
      els.showNearbyBtn.classList.toggle('primary', state.nearbyOnly);
      render();
      startAutoLocation();
    }

    bootstrap();
  </script>
</body>
</html>
